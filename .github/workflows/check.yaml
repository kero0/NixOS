name: "OS build check"
permissions:
  contents: write
  pull-requests: write
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
jobs:
  build-check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwinConfigurations.Kirolss-MacBook-Pro.system
            os: macos-15
            free-space: false
          - target: homeConfigurations.kirolsb.activationPackage
            os: ubuntu-latest
            free-space: false
          - target: nixosConfigurations.Kirols-xps9575.config.system.build.toplevel
            os: ubuntu-latest
            free-space: true
          - target: nixosConfigurations.justice.config.system.build.toplevel
            os: ubuntu-latest
            free-space: true
          - target: nixosConfigurations.theater.config.system.build.toplevel
            os: ubuntu-latest
            free-space: true
          - target: nixosConfigurations.tang.config.system.build.toplevel
            os: ubuntu-24.04-arm
            free-space: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        if: ${{ matrix.free-space }}
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: true

          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f
        with:
          extra-conf: |
            extra-experimental-features = flakes nix-command recursive-nix pipe-operators

      - name: Check OS build
        id: build
        shell: bash
        run: |
          result=$(nix build --accept-flake-config --show-trace --print-out-paths --no-link -L .#${{ matrix.target }})
          res=$?

          echo "result=$result" >> $GITHUB_OUTPUT
          if [ $res -eq 0 ]; then
            echo "build_result=success" >> $GITHUB_OUTPUT
          else
            echo "build_result=failure" >> $GITHUB_OUTPUT
            exit $res
          fi

      - name: Diff profile
        id: diff
        run: |
          {
            new_path="${{ steps.build.outputs.result }}"
            echo "new_path=$new_path" >> $GITHUB_OUTPUT
            old_path=$(nix eval --accept-flake-config --raw ".#${{ matrix.target }}")
            res=$?
            if [ $res -ne 0 ]; then
              echo "Failed to get old path for ${{ matrix.target }}" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo 'body<<EOF'
            echo "# ${{ matrix.target }} changes"


            nix store diff-closures --accept-flake-config --derivation \
                "$old_path" \
                "$new_path" | sed 's/\x1b\[[0-9;]*m//g'
            res=$?

            echo 'EOF'
          } >> $GITHUB_OUTPUT
          if [ $res -eq 0 ]; then
            echo "diff_result=success" >> $GITHUB_OUTPUT
          else
            echo "diff_result=failure" >> $GITHUB_OUTPUT
            exit $res
          fi

      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71
        with:
          name: kero0
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: nix-community
          pathsToPush: ${{ steps.build.outputs.result }}

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const body = `${{ steps.diff.outputs.body }}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Comment on commit
        if: github.event_name == 'push'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const body = `${{ steps.diff.outputs.body }}`;

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body
            });

  builds-passed:
    name: All builds succeeded
    needs: build-check
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.build-check.result }}" != "success" ]; then
            echo "Some tests failed"
            exit 1
          fi
          echo "All tests passed"
