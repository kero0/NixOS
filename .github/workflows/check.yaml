name: "OS build check"
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
jobs:
  build-check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwinConfigurations.Kirolss-MacBook-Pro.system
            os: macos-15
          - target: homeConfigurations.kirolsb.activationPackage
            os: ubuntu-latest
          - target: nixosConfigurations.Kirols-xps9575.config.system.path
            os: ubuntu-latest
          - target: nixosConfigurations.justice.config.system.path
            os: ubuntu-latest
          - target: nixosConfigurations.theater.config.system.path
            os: ubuntu-latest
          - target: nixosConfigurations.tang.config.system.path
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        if: runner.os == 'Linux'
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: true

          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@92148bb48b9a0c5458c53dd0b368fbfbfbaa3210
        with:
          extra-conf: |
            extra-experimental-features = flakes nix-command recursive-nix pipe-operators
      - uses: cachix/cachix-action@a593539ec5b1ba1eb95f89a396efd45ca2cdaf5d
        with:
          name: kero0
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: nix-community
      - name: Check OS build
        shell: bash
        run: |
          nix build --accept-flake-config --show-trace -L '.#${{ matrix.target }}'
      - name: Diff profile
        id: diff
        run: |
          echo "# ${{ matrix.target }} changes" > message-body
          nix store diff-closures --accept-flake-config --derivation \
              "github:${{ github.repository }}/${{ github.event.before }}#${{ matrix.target }}" \
              ".#${{ matrix.target }}" | sed 's/\x1b\[[0-9;]*m//g' >> message-body
      - name: Comment PR
        uses: peter-evans/create-or-update-comment@57232238742e38b2ccc27136ce596ccae7ca28b4
        if: github.event_name == 'pull_request'
        with:
          body-path: message-body
          issue-number: ${{ github.event.pull_request.number }}
      - name: Comment Commit
        uses: peter-evans/commit-comment@7bef1534f8904aa6a06c51c9c362573085cf6092
        if: github.event_name == 'push'
        with:
          body-path: message-body
