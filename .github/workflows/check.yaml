name: "OS build check"
permissions:
  contents: write
  pull-requests: write
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
jobs:
  build-check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwinConfigurations.Kirolss-MacBook-Pro.system
            os: macos-15
            free-space: false
          - target: homeConfigurations.kirolsb.activationPackage
            os: ubuntu-latest
            free-space: false
          - target: nixosConfigurations.Kirols-xps9575.config.system.path
            os: ubuntu-latest
            free-space: true
          - target: nixosConfigurations.justice.config.system.path
            os: ubuntu-latest
            free-space: true
          - target: nixosConfigurations.theater.config.system.path
            os: ubuntu-latest
            free-space: true
          - target: nixosConfigurations.tang.config.system.path
            os: ubuntu-24.04-arm
            free-space: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        if: ${{ matrix.free-space }}
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: true

          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@92148bb48b9a0c5458c53dd0b368fbfbfbaa3210
        with:
          extra-conf: |
            extra-experimental-features = flakes nix-command recursive-nix pipe-operators
      - uses: cachix/cachix-action@4ee54539d70638c5ce6c547ec6765bea7af27c00
        with:
          name: kero0
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: nix-community
      - name: Check OS build
        shell: bash
        run: |
          nix build --accept-flake-config --show-trace -L '.#${{ matrix.target }}'
      - name: Diff profile
        id: diff
        run: |
          {
            echo 'body<<EOF'
            echo "# ${{ matrix.target }} changes"

            nix store diff-closures --accept-flake-config --derivation \
                "github:${{ github.repository }}/${{ github.event.before }}#${{ matrix.target }}" \
                ".#${{ matrix.target }}" | sed 's/\x1b\[[0-9;]*m//g'

            echo 'EOF'
          } >> $GITHUB_OUTPUT
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const body = `${{ steps.diff.outputs.body }}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Comment on commit
        if: github.event_name == 'push'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const body = `${{ steps.diff.outputs.body }}`;

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body
            });

  builds-passed:
    name: All builds succeeded
    needs: build-check
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.build-check.result }}" != "success" ]; then
            echo "Some tests failed"
            exit 1
          fi
          echo "All tests passed"
  auto-close-dependabot:
    name: Auto close dependabot failed PRs
    needs: builds-passed
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.builds-passed.result }}" != "success" ]; then
            gh pr close -d -c 'Closing failed dependabot update' "$PR_URL"
            echo "Some tests failed"
          fi
          echo "All tests passed"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
