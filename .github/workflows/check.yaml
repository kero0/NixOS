name: "OS build check"
on:
  workflow_dispatch:
  pull_request:
  push:
jobs:
  build-check:
    strategy:
      matrix:
        include:
          - target: nixosConfigurations.Kirols-xps9575.config.system.path
            os: ubuntu-latest
          - target: homeConfigurations.\"kbakheat@na1.ford.com\".activationPackage
            os: ubuntu-latest
          - target: darwinConfigurations.Kirolss-MacBook-Pro.system
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        if: runner.os == 'Linux'
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: true

          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v1
      - name: Cache nix
        uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Check OS build
        shell: bash
        run: |
          nix build --show-trace '.#${{ matrix.target }}'
