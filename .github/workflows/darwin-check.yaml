name: "Darwin check"
on:
  workflow_dispatch:
  pull_request:
  push:
jobs:
  darwin-check:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v1
      - name: Cache nix
        uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix build --show-trace .#darwinConfigurations.Kirolss-MacBook-Pro.system
